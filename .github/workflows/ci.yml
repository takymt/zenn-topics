name: ci

on:
  push:
    tags-ignore:
      - '*'
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          gofmt -w .
          git diff --exit-code

      - name: Unit tests
        run: go test ./...

      - name: Coverage smoke
        run: go test -cover ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.9.0
